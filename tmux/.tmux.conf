# Remap prefix from C-b to C-a.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set-option -g status-position top

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

set -g default-terminal "xterm-256color"
set-window-option -g automatic-rename on
set-option -g set-titles on
setw -g mouse on
setw -g mode-keys vi

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
bind -n S-Left previous-window
bind -n S-Right next-window

set -g pane-border-status top
set -g pane-border-format "#P: #{pane_current_command}"

set-option -g @tmux-weather-location "Munich"
set-option -g @tmux-weather-format "%c+%t+%w"
set-option -g @tmux-weather-units "m"

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "directory session weather"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'xamut/tmux-weather'
set -g @tmux-gruvbox 'dark'

if-shell 'command -v pbcopy >/dev/null 2>&1' {
  bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell 'command -v xclip >/dev/null 2>&1' {
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"
    bind -T copy-mode-vi C-j send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"
  }
}

if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' \
  "run '~/.tmux/plugins/tpm/tpm'" \
  "set -g status-bg black; set -g status-fg white; set -g window-status-current-style bg=white,fg=black,bold; set -g status-interval 60; set -g status-left-length 40; set -g status-left '#[fg=green](#S) #(whoami)'; set -g status-right '#[fg=white]%Y-%m-%d %H:%M#[default]'"
